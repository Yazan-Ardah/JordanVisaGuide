// ─── STATE ────────────────────────────────────────────────────────────────────
let checked = {};
let currentVisa = Object.keys(VISA_DATA)[0];

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  // Populate select
  const sel = document.getElementById('visaSelect');
  Object.keys(VISA_DATA).forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = VISA_DATA[k].flag + '  ' + k;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => { currentVisa = sel.value; checked = {}; render(); });

  // Check URL param ?visa=...
  const params = new URLSearchParams(location.search);
  const param = params.get('visa');
  if (param && VISA_DATA[param]) { currentVisa = param; sel.value = param; }

  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const visa = VISA_DATA[currentVisa];
  const root = document.getElementById('checklistRoot');
  root.innerHTML = '';

  let totalItems = 0;
  let checkedItems = 0;

  visa.categories.forEach(cat => {
    totalItems += cat.items.length;
    checkedItems += cat.items.filter(i => checked[i.id]).length;

    const card = document.createElement('div');
    card.className = 'checklist-card';

    const doneInCat = cat.items.filter(i => checked[i.id]).length;
    card.innerHTML = `
      <div class="category-header">
        <span class="category-icon">${cat.icon}</span>
        <span class="category-title">${cat.title}</span>
        <span class="category-count">${doneInCat}/${cat.items.length}</span>
      </div>
      ${cat.items.map(item => `
        <div class="checklist-item${checked[item.id] ? ' checked' : ''}" onclick="toggle('${item.id}')">
          <div class="checkbox">
            <svg class="checkbox-tick" width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="item-text">
            <div class="item-name">${item.name}</div>
            ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
          </div>
          <span class="item-badge badge-${item.badge}">${item.badge}</span>
        </div>
      `).join('')}
    `;
    root.appendChild(card);
  });

  // Progress
  const pct = totalItems === 0 ? 0 : Math.round((checkedItems / totalItems) * 100);
  document.getElementById('progressLabel').textContent = `${checkedItems} of ${totalItems} items checked`;
  document.getElementById('progressPct').textContent = pct + '%';
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.className = 'progress-bar-fill' + (pct === 100 ? ' complete' : '');
}

function toggle(id) {
  checked[id] = !checked[id];
  render();
}

function resetChecks() {
  checked = {};
  render();
}

// ─── PDF EXPORT ───────────────────────────────────────────────────────────────

      <!-- Header -->
      <div style="display:flex; align-items:center; gap:14px; padding-bottom:20px; border-bottom:3px solid #e85d2f; margin-bottom:28px;">
        <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#e85d2f,#ff8c5a);display:flex;align-items:center;justify-content:center;font-size:24px;">🇯🇴</div>
        <div>
          <div style="font-size:22px;font-weight:800;color:#1a1a3e;letter-spacing:-.02em;">Jordan Visa Guide</div>
          <div style="font-size:12px;color:#6b7280;margin-top:2px;">visasjo.com · Trusted visa information for Jordanians</div>
        </div>
        <div style="margin-left:auto;text-align:right;">
          <div style="font-size:11px;color:#9ca3af;">Generated</div>
          <div style="font-size:12px;font-weight:600;color:#1a1a3e;">${now}</div>
        </div>
      </div>

      <!-- Visa title -->
      <div style="margin-bottom:24px;">
        <div style="font-size:11px;font-weight:700;color:#e85d2f;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Document Checklist</div>
        <div style="font-size:20px;font-weight:800;color:#1a1a3e;">${visa.flag} ${currentVisa}</div>
        <div style="font-size:13px;color:#6b7280;margin-top:6px;line-height:1.5;">${visa.intro}</div>
      </div>

      <!-- Progress summary -->
      ${(function(){
        let total = 0, done = 0;
        visa.categories.forEach(c => { total += c.items.length; c.items.forEach(i => { if(checked[i.id]) done++; }); });
        const pct = total ? Math.round(done/total*100) : 0;
        return `
          <div style="background:#f8f9ff;border-radius:12px;padding:14px 18px;margin-bottom:28px;display:flex;align-items:center;gap:16px;">
            <div style="flex:1;height:8px;background:#e8e8f0;border-radius:100px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:${pct===100?'#10b981':'#e85d2f'};border-radius:100px;"></div>
            </div>
            <div style="font-size:13px;font-weight:700;color:#1a1a3e;white-space:nowrap;">${done}/${total} · ${pct}% complete</div>
          </div>
        `;
      })()}

      <!-- Categories -->
      ${visa.categories.map(cat => `
        <div style="margin-bottom:28px;">
          <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f0f0f8;border-radius:10px;margin-bottom:12px;">
            <span style="font-size:16px;">${cat.icon}</span>
            <span style="font-size:12px;font-weight:700;color:#1a1a3e;text-transform:uppercase;letter-spacing:.06em;">${cat.title}</span>
          </div>
          ${cat.items.map(item => {
            const done = checked[item.id];
            return `
              <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid #f0f0f8;${done?'background:#f0fdf7;':''}">
                <div style="width:20px;height:20px;flex-shrink:0;border-radius:5px;margin-top:1px;border:2px solid ${done?'#10b981':'#d1d5db'};background:${done?'#10b981':'#fff'};display:flex;align-items:center;justify-content:center;">
                  ${done ? '<span style="color:#fff;font-size:12px;font-weight:900;">✓</span>' : ''}
                </div>
                <div style="flex:1;">
                  <div style="font-size:13px;font-weight:600;color:${done?'#6b7280':'#1a1a3e'};${done?'text-decoration:line-through;':''}">${item.name}</div>
                  ${item.note ? `<div style="font-size:11px;color:#9ca3af;margin-top:2px;">${item.note}</div>` : ''}
                </div>
                <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;text-transform:uppercase;background:${item.badge==='required'?'rgba(239,68,68,.1)':item.badge==='original'?'rgba(232,93,47,.1)':'rgba(107,114,128,.1)'};color:${item.badge==='required'?'#dc2626':item.badge==='original'?'#e85d2f':'#6b7280'};">${item.badge}</span>
              </div>
            `;
          }).join('')}
        </div>
      `).join('')}

      <!-- Footer -->
      <div style="margin-top:32px;padding-top:16px;border-top:1px solid #e8e8f0;font-size:11px;color:#9ca3af;line-height:1.6;text-align:center;">
        Always verify requirements with the official embassy before your appointment. Information correct as of ${now}.<br/>
        Generated by <strong>Jordan Visa Guide</strong> · visasjo.com
      </div>
    </div>
  `;

  const el = document.createElement('div');
  el.innerHTML = pdfHTML;
  document.body.appendChild(el);

  const safeName = currentVisa.replace(/[^a-zA-Z0-9]/g, '_');
  html2pdf().set({
    margin:        0,
    filename:      `VisasJo_${safeName}_Checklist.pdf`,
    image:         { type: 'jpeg', quality: 0.97 },
    html2canvas:   { scale: 2, useCORS: true, logging: false },
    jsPDF:         { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak:     { mode: ['avoid-all'] }
  }).from(el).save().then(() => {
    document.body.removeChild(el);
    if (typeof umami !== 'undefined') umami.track('checklist-pdf-download', { visa: currentVisa });
  });
}

init();
</script>
</body>
</html>
